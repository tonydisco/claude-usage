version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: claude-usage
    main: ./cmd/claude-usage
    binary: claude-usage
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}} -X main.commit={{.Commit}} -X main.date={{.Date}}

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - Merge pull request
      - Merge branch

brews:
  - name: claude-usage
    skip_upload: auto
    repository:
      owner: tonydisco
      name: homebrew-tap
      branch: main
    homepage: "https://github.com/tonydisco/claude-usage"
    description: "Know how much of your Claude.ai plan you've burned — from your terminal."
    license: "MIT"
    commit_author:
      name: goreleaserbot
      email: bot@goreleaser.com
    install: |
      bin.install "claude-usage"
    test: |
      system "#{bin}/claude-usage", "--help"

release:
  draft: false
  prerelease: auto
  github:
    owner: tonydisco
    name: claude-usage
